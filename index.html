<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Auth BBQ PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center">
        <h1 class="text-2xl font-bold text-indigo-600 mb-2">Auth Tester</h1>
        <p class="text-gray-500 text-sm mb-6">Uji Client ID & Secret Firebase</p>

        <div id="status-box" class="mb-6 p-4 rounded-xl bg-gray-50 text-sm font-mono break-all">
            Status: Menunggu klik tombol...
        </div>

        <button id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg flex items-center justify-center gap-2">
            <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M21.35 11.1h-9.17v2.73h6.51c-.33 1.56-1.56 2.73-3.21 2.73c-2.02 0-3.65-1.63-3.65-3.65s1.63-3.65 3.65-3.65c.95 0 1.81.37 2.45 1.01l2.12-2.12C18.71 6.91 16.99 6 15 6c-3.87 0-7 3.13-7 7s3.13 7 7 7c4.04 0 7-2.97 7-7c0-.46-.04-.9-.15-1.34Z"/></svg>
            Login dengan Google
        </button>

        <div id="user-info" class="mt-6 hidden text-left border-t pt-4">
            <p class="text-xs font-bold text-green-600 mb-2 font-mono">✓ KONEKSI BERHASIL</p>
            <div class="flex items-center gap-3">
                <img id="user-photo" src="" class="w-12 h-12 rounded-full border">
                <div>
                    <p id="user-name" class="font-bold text-sm"></p>
                    <p id="user-email" class="text-xs text-gray-500"></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Import Firebase SDK v10
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Konfigurasi Project Anda
        const firebaseConfig = {
            apiKey: "AIzaSyBVrPa8HaWOSLeZM0m9eO0ZkO5UlVTcb2s",
            authDomain: "mocharettadev-313db.firebaseapp.com",
            databaseURL: "https://mocharettadev-313db-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mocharettadev-313db",
            storageBucket: "mocharettadev-313db.firebasestorage.app",
            messagingSenderId: "338398624429",
            appId: "1:338398624429:web:945ac927b840269f976424",
            measurementId: "G-J1Z9JE6KH6"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const btn = document.getElementById('loginBtn');
        const statusBox = document.getElementById('status-box');

        btn.addEventListener('click', () => {
            statusBox.innerText = "Membuka jendela Google...";
            statusBox.className = "mb-6 p-4 rounded-xl bg-blue-50 text-blue-700 text-sm font-mono";

            signInWithPopup(auth, provider)
                .then((result) => {
                    // Berhasil Login
                    const user = result.user;
                    statusBox.innerText = "Suksess! Client ID & Secret Valid.";
                    statusBox.className = "mb-6 p-4 rounded-xl bg-green-50 text-green-700 text-sm font-mono";
                    
                    // Tampilkan data user
                    document.getElementById('user-info').classList.remove('hidden');
                    document.getElementById('user-name').innerText = user.displayName;
                    document.getElementById('user-email').innerText = user.email;
                    document.getElementById('user-photo').src = user.photoURL;
                })
                .catch((error) => {
                    // Gagal Login
                    console.error(error);
                    statusBox.innerText = "Gagal: " + error.code + " - " + error.message;
                    statusBox.className = "mb-6 p-4 rounded-xl bg-red-50 text-red-700 text-sm font-mono";
                    
                    if(error.code === "auth/configuration-not-found") {
                        statusBox.innerText += " (Cek lagi apakah Google Sign-in sudah di-Enable di Firebase Console)";
                    }
                });
        });
    </script>
</body>
</html>
